naftiko: 1.0.0-alpha2
info:
  label: 'Amazon DocumentDB API — #DescribeDBInstances'
  description: 'Amazon DocumentDB API — #DescribeDBInstances. 1 operations. Lead operation: Amazon DocumentDB Describe DB
    Instances. Self-contained Naftiko capability covering one Amazon Documentdb business surface.'
  tags:
  - Amazon Documentdb
  - '#DescribeDBInstances'
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_DOCUMENTDB_API_KEY: AMAZON_DOCUMENTDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-documentdb-describedbinstances
    baseUri: https://rds.amazonaws.com
    description: 'Amazon DocumentDB API — #DescribeDBInstances business capability. Self-contained, no shared references.'
    resources:
    - name: '#DescribeDBInstances'
      path: /#DescribeDBInstances
      operations:
      - name: describedbinstances
        method: GET
        description: Amazon DocumentDB Describe DB Instances
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: Version
          in: query
          type: string
          required: true
        - name: DBInstanceIdentifier
          in: query
          type: string
          description: The identifier of the DB instance to describe.
        - name: MaxRecords
          in: query
          type: integer
          description: The maximum number of records to include in the response.
        - name: Marker
          in: query
          type: string
          description: An optional pagination token provided by a previous request.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_DOCUMENTDB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-documentdb-describedbinstances-rest
    port: 8080
    description: 'REST adapter for Amazon DocumentDB API — #DescribeDBInstances. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.'
    resources:
    - path: /v1/describedbinstances
      name: describedbinstances
      description: 'REST surface for #DescribeDBInstances.'
      operations:
      - method: GET
        name: describedbinstances
        description: Amazon DocumentDB Describe DB Instances
        call: amazon-documentdb-describedbinstances.describedbinstances
        with:
          Action: rest.Action
          Version: rest.Version
          DBInstanceIdentifier: rest.DBInstanceIdentifier
          MaxRecords: rest.MaxRecords
          Marker: rest.Marker
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-documentdb-describedbinstances-mcp
    port: 9090
    transport: http
    description: 'MCP adapter for Amazon DocumentDB API — #DescribeDBInstances. One tool per consumed operation, routed inline
      through this capability''s consumes block.'
    tools:
    - name: amazon-documentdb-describe-db-instances
      description: Amazon DocumentDB Describe DB Instances
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-documentdb-describedbinstances.describedbinstances
      with:
        Action: tools.Action
        Version: tools.Version
        DBInstanceIdentifier: tools.DBInstanceIdentifier
        MaxRecords: tools.MaxRecords
        Marker: tools.Marker
      outputParameters:
      - type: object
        mapping: $.
